workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "pipeline"

# Currently there is just on stage: build. Different jobs compile different versions of EAR by using
# compile.sh script provided in the ear_ci repository: https://gitlab.bsc.es/ear_team/ear-ci
stages:          # List of stages for jobs, and their order of execution
  - build
  - test
  - release

image: registry.gitlab.bsc.es/ear_team/ear-ci

compile-no-mpi-loader:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - export CONFIG_SITE="$TESTDIR/config-sites/config.no-mpi-loader.site"
    - CONFIGURE_FLAGS="--prefix=$PWD/ear-no-mpi-loader" $TESTDIR/compile.sh
    - make install
  artifacts:
    untracked: false
    when: on_success
    expire_in: 1 days
    paths:
      - "ear-no-mpi-loader"

compile-no-mpi:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - export CONFIG_SITE="$TESTDIR/config-sites/config.no-mpi.site"
    - MAKE_FEATURES="MPI_CFLAGS='$(pkgconf ompi-c --cflags)'" $TESTDIR/compile.sh

compile-mpi:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - export CONFIG_SITE="$TESTDIR/config-sites/config.ompi.site"
    - MAKE_FEATURES="MPI_CFLAGS='$(pkgconf ompi-c --cflags)'" CONFIGURE_FLAGS="--prefix=$PWD/ear-ompi" $TESTDIR/compile.sh
    - make install
  artifacts:
    when: on_success
    expire_in: 1 days
    paths:
      - "ear-ompi"

test-install-no-mpi-loader:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_COMMIT_TAG
      when: never
    - when: always
  needs: [compile-no-mpi-loader]
  script:
    - echo "Checking installation for no MPI Loader installation"
    - $TESTDIR/test_install.sh ear-no-mpi-loader
    - test -f ear-no-mpi-loader/lib/libear.gen.so

test-install-mpi:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_COMMIT_TAG
      when: never
    - when: always
  needs: [compile-mpi]
  script:
    - echo "Checking installation for MPI installation"
    - $TESTDIR/test_install.sh ear-ompi
    - test -f ear-ompi/lib/libear.ompi.so

release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG                 # Run this job when a tag is created
  script:
    - apk add --no-cache python3
    - python3 etc/release/get_latest_tag_changelog.py CHANGELOG.md > changelog.txt
    - git diff $(git describe --abbrev=0 --tags HEAD~) > release.patch
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: ./changelog.txt
  artifacts:
    paths:
      - release.patch

publish_patch:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
  trigger:
    project: EAR_team/EAR
    branch: test-branch

apply_patch:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline"
  needs:
    - project: EAR_team/ear_private
      job: release_job
      ref: v5
      artifacts: true
  script:
    - cat release.patch
