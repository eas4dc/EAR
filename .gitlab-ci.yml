workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:          # List of stages for jobs, and their order of execution
  - quality
  - build
  - test
  - deploy
  - release

image: registry.gitlab.bsc.es/ear_team/ear-ci:v6

debugs_disabled:
  image: alpine:3.23
  stage: quality
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - if grep -rIE -e "^[[:blank:]]*#define[[:blank:]]+SHOW_DEBUGS" -e "^[[:blank:]]*#define[[:blank:]]+DEBUG_ENABLED[[:blank:]]+1" src; then false; else true; fi

clang-format:
  stage: quality
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  image: rockylinux:8-minimal
  script:
    - microdnf install -y clang-tools-extra-19.1.7-2.module+el8.10.0+1965+112b558b findutils
    - find src/ -name "*.[ch]" -exec clang-format --Werror --fail-on-incomplete-format --dry-run {} +

compile-no-mpi-loader:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    # This script compiles, installs, and test the correctness of the installation
    - $TESTDIR/build/compile_no_mpi_loader.sh
  artifacts:
    untracked: false
    when: on_success
    expire_in: 1 days
    paths:
      - "ear-no-mpi-loader"

compile-no-mpi:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - $TESTDIR/build/compile_no_mpi.sh

compile-mpi-mysql:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - dnf install -y gcc-toolset-$GCC_TOOLSET
    - source /opt/rh/gcc-toolset-$GCC_TOOLSET/enable
    - $TESTDIR/build/compile_mpi_mysql.sh
  artifacts:
    when: on_success
    expire_in: 1 days
    paths:
      - "ear-db"
  parallel:
    matrix:
      - GCC_TOOLSET: [11, 12, 13, 14]

deploy-eardbd:
  stage: deploy
  needs: [compile-mpi-mysql]
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  variables:
    MARIADB_ROOT_PASSWORD: my-secret-pw
  services:
    - name: mariadb:11-ubi9
      alias: mariadb
  script:
    - cp ear-db/etc/ear/ear.conf.full.template ear-db/etc/ear/ear.conf
    - $TESTDIR/scripts/create_db.sh ear-db ear-db/etc/ear/ear.conf
    - $TESTDIR/scripts/deploy_eardbd.sh ear-db ear-db/etc
  artifacts:
    when: always
    paths:
      - "ear-db"
      - eardbd.out

deploy-eard:
  stage: deploy
  needs: [compile-mpi-mysql]
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  script:
    - cp ear-db/etc/ear/ear.conf.full.template ear-db/etc/ear/ear.conf
    - $TESTDIR/scripts/deploy_eard.sh ear-db ear-db/etc
  after_script:
    - mkdir ear_tmp
    - test -f /tmp/eard_journal.log && cp /tmp/eard_journal.log . || true
    - test -f /tmp/ear-dyn.conf && cp /tmp/ear-dyn.conf . || true
    - test -d /var/ear && cp -r /var/ear ear_tmp || true
  artifacts:
    name: eard_logs
    when: always
    paths:
      - eard.out # The stdout/stderr of the eard, generated by the deploy_eard.sh script.
      - eard_journal.log
      - ear-dyn.conf
      - ear_tmp

test-earl-mpi-lite:
  stage: test
  needs: [compile-mpi-mysql]
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  timeout: 10 minutes
  script:
    - export PATH=$(pkgconf --variable=exec_prefix ompi-f90)/bin:$PATH
    - $TESTDIR/scripts/compile_nas.sh $TESTDIR/apps/NPB3.4.3/NPB3.4-MPI bt B
    - export EAR_ETC=ear-db/etc ; export EAR_INSTALL_PATH=ear-db ; export EAR_TMP=/tmp
    - OMPI_ALLOW_RUN_AS_ROOT=1 OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1 mpirun --oversubscribe -np 4 ear-db/bin/erun --ear=on --ear-verbose=1 --program="$TESTDIR/apps/NPB3.4.3/NPB3.4-MPI/bin/bt.B.x" 2> >(tee earl.out)
  artifacts:
    when: always
    name: earl-mpi_out
    paths:
      - earl.out

test-earl-omp-lite:
  stage: test
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  needs: [compile-no-mpi-loader]
  timeout: 10 minutes
  script:
    - $TESTDIR/scripts/compile_nas.sh $TESTDIR/apps/NPB3.4.3/NPB3.4-OMP bt B
    - export EAR_ETC=ear-no-mpi-loader/etc ; export EAR_INSTALL_PATH=ear-no-mpi-loader ; export EAR_TMP=/tmp ; export OMP_NUM_THREADS=2
    - ear-no-mpi-loader/bin/erun --ear=on --ear-verbose=1 --program="$TESTDIR/apps/NPB3.4.3/NPB3.4-OMP/bin/bt.B.x" 2> >(tee earl.out)
  artifacts:
    when: always
    name: earl-omp_out
    paths:
      - earl.out

release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG                 # Run this job when a tag is created
  script:
    - apk add --no-cache python3
    - python3 etc/release/get_latest_tag_changelog.py CHANGELOG.md > changelog.txt
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: ./changelog.txt
  artifacts:
    paths:
      - changelog.txt

publish_patch:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_PROJECT_NAME == "ear"
      when: never
    - if: $CI_COMMIT_TAG
  needs:
    - job: release_job
      artifacts: true
  variables:
    GIT_STRATEGY: clone
  script:
    - git diff $(git describe --abbrev=0 --tags --exclude="$(git describe --abbrev=0 --tags)") > release.patch
    - git clone --branch=release-v6 https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.bsc.es/ear_team/ear
    - cd ear
    - git apply --whitespace=fix --reject ../release.patch
    - git add .
    - git config user.name "CI Pipeline"
    - git config user.email $GITLAB_USER_EMAIL
    - git commit --file=../changelog.txt
    - git tag $CI_COMMIT_TAG
    - git remote set-url origin https://oauth2:$AUTOMATION_ACCESS_TOKEN@gitlab.bsc.es/ear_team/ear
    - git push
    - git push --tags
